<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Nepflix Nepal</title>
    <link rel="stylesheet" href="signup_style.css">
    <link rel="icon" type="image/x-icon" href="./assets/img/N bar.png">
</head>
<body>

    <!-- Main Container -->
    <div class="container">

        <!-- LEFT SIDE: Single Image -->
        <div class="poster-section">
            <img src="assets/img/sign_up_page_pic.png" alt="Signup Image" class="poster-single-img">
        </div>

        <!-- RIGHT SIDE: Sign Up Form -->
        <div class="form-section">

            <!-- Background Image with Overlay -->
            <div class="background-overlay"></div>

            <!-- Content Wrapper -->
            <div class="content-wrapper">

                <!-- Top Navigation Bar -->
                <div class="top-bar">
                    <!-- Logo (Left) -->
                    <div class="logo">
                        <img src="./assets/img/iconN.png" alt="Nepflix Logo" class="logo-img">
                    </div>

                    <!-- Sign In Link (Right) -->
                    <div class="signin-link">
                        <span class="signin-text">Already have an account?</span>
                        <a href="index.html"><button class="btn-signin">Sign in</button></a>
                    </div>
                </div>

                <!-- Sign Up Form Container -->
                <div class="form-container">
                    <h1 class="form-title">Sign up</h1>

                    <form class="signup-form" id="signupForm" action="home_html.html" method="get">

                        <!-- First Name & Last Name Row -->
                        <div class="input-row">
                            <div class="input-group half">
                                <input type="text" id="firstName" name="firstName" placeholder=" " required>
                                <label for="firstName">First Name</label>
                            </div>
                            <div class="input-group half">
                                <input type="text" id="lastName" name="lastName" placeholder=" " required>
                                <label for="lastName">Last Name</label>
                            </div>
                        </div>

                        <!-- Email or Phone -->
                        <div class="input-group">
                            <input type="email" id="email" name="email" placeholder=" " required>
                            <label for="email">Email or Phone</label>
                        </div>

                        <!-- Password with Eye Toggle (CSS-only trick using checkbox) -->
                        <div class="input-group password-group">
                            <input type="password" id="password" name="password" placeholder=" " required minlength="8">
                            <label for="password">Password</label>
                            <label class="password-toggle" for="showPassword" title="Show/Hide Password">
                            </label>
                        </div>

                        <!-- Continue Button -->
                        <a href="intro.html" class="btn-continue">Continue</a>

                        <!-- Remember Me Checkbox -->
                        <div class="remember-me">
                            <input type="checkbox" id="remember" name="remember" class="checkbox">
                            <label for="remember" class="checkbox-label">Remember me</label>
                        </div>

                        <!-- OR Separator -->
                        <div class="separator">
                            <span class="separator-text">or</span>
                        </div>

                        <!-- Facebook Button -->
                        <button type="button" class="btn-facebook">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                            </svg>
                            Sign up with Facebook
                        </button>

                        <!-- reCAPTCHA Disclaimer -->
                        <p class="recaptcha-text">
                            This page is protected by Google reCAPTCHA to ensure you're not a bot.
                            <a href="#" class="learn-more">Learn more.</a>
                        </p>

                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
